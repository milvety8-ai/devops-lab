# docker-compose.yml
services:
  app:
    build: ./app
    container_name: lab-app
    environment:
      - APP_VERSION=1.0.0
    # Порт 5000 НЕ пробрасываем наружу —
    # к приложению доступ только через Nginx
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: lab-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - backend

networks:
  backend:
    driver: bridge